name: Mon-100-8K System Verification

# Trigger the workflow on every push or pull request to the main branch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify-hardware-software-layers:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x] # Runs on modern LTS Node environment

    steps:
      - name: 🔍 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js Runtime environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Install Project Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: 📁 Initialize Projector Directory Framework
        run: npm run sys-init

      - name: 🌐 Run Simulation & Network Checks
        run: |
          npm run start-download
          npm run fetch-updates
