name: Mon-100-8K System Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify-hardware-software-layers:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: 🔍 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js Runtime environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # Removed the strict 'cache: npm' constraint to bypass the lockfile error

      - name: 📦 Install Project Dependencies
        run: npm install

      - name: 📁 Initialize Projector Directory Framework
        run: npm run sys-init

      - name: 🌐 Run Simulation & Network Checks
        run: |
          npm run start-download
          npm run fetch-updates
          npm run start-video-chat
